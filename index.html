<!DOCTYPE html>
<html lang="en">
    <head>
        <style>
            body{
                overflow:hidden;
                width:100vw;
                height:100vh;
                margin:0
                /* background-image: url('introBackground.png');
                background-repeat: no-repeat;
                background-attachment: fixed; */
            }
            
        </style>
        <title>A COMPLETELY ORIGINAL GAME</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        
        <canvas id="myCanvas" width=1920 height=1080 style="position:absolute; z-index: 0"></canvas>
        <div id="gamePage" display:none>
                <div id="world" style="position: relative;left: 0;right: 0;">
                    <script src="initialization.js" defer></script>
                    <script src="helpers.js" defer></script>
                    <script src="game.js" defer></script>
                </div>
        </div>
        <div id="losePage" style="display:none">            
            <h1 style="text-align: center; font-size: 67px; position: absolute; top: 0; left: 0; width: 100%; z-index: 1000; margin: 0;"><span style="background-color: black; color: white">You Lost</span></h1>
            <button onclick="ChangePage('difficultyPage', false)" style="text-align: center; font-size: 67px; position: relative; top: 230px; left: 0px; width: 100%; z-index: 1000; margin: 0px;">Restart</button>

        </div>
        <div id="winPage" style="display:none">            
            <h1 style="text-align: center; font-size: 67px; position: absolute; top: 0; left: 0; width: 100%; z-index: 1000; margin: 0;"><span style="background-color: black; color: white">You Win!</span></h1>
            <button onclick="ChangePage('difficultyPage', false)" style="text-align: center; font-size: 67px; position: relative; top: 230px; left: 0px; width: 100%; z-index: 1000; margin: 0px;">Play Again</button>

        </div>
        <div id="upgradePage" style="display:none">
            <h1 style="text-align: center; font-size: 67px; position: absolute; top: 0; left: 0; width: 100%; z-index: 1000; margin: 0;"><span style="background-color: black; color: white">Choose Your Upgrade</span></h1>
        </div>
        <div id="IntroPage">
            <h1 style="text-align: center; font-size: 67px; position: relative; top: 0; left: 0; width: 100%; z-index: 1000; margin: 0;"><span style="background-color: black; color: white">A Very Cool Game</span></h1>
            
            <button onclick="ChangePage('difficultyPage', false)" style="text-align: center; font-size: 67px; position: relative; top: 230px; left: 0px; width: 100%; z-index: 1000; margin: 0px;">START</button>
            <button onclick="ChangePage('helpPage', false)" style="text-align: center; font-size: 67px; position: relative; top: 300px; left: 0; width: 100%; z-index: 1000; margin: 0;">How to Play</button>

        </div>
        <div id="difficultyPage" style="display:none">
            <h1 style="text-align: center; font-size: 67px; position: relative; top: 0; left: 0; width: 100%; z-index: 1000; margin: 0;"><span style="background-color: black; color: white">Choose Your Difficulty</span></h1>
            
            <button onclick="Commence(1)" style="text-align: center; font-size: 67px; position: relative; top: 130px; left: 0px; width: 100%; z-index: 1000; margin: 0px;">Easy</button>
            <button onclick="Commence(2)" style="text-align: center; font-size: 67px; position: relative; top: 150px; left: 0px; width: 100%; z-index: 1000; margin: 0px;">Normal</button>
            <button onclick="Commence(3)" style="text-align: center; font-size: 67px; position: relative; top: 170px; left: 0px; width: 100%; z-index: 1000; margin: 0px;">Hard</button>
            <button onclick="Commence(4)" style="text-align: center; font-size: 67px; position: relative; top: 190px; left: 0px; width: 100%; z-index: 1000; margin: 0px;">Extreme Demon</button>

        </div>
        
        <div id="helpPage" style="display:none">
            <h1 style="text-align: center; font-size: 67px; position: relative; top: 0px; left: 0; width: 100%; z-index: 1000; margin: 0px;"><span style="background-color: black; color: white">A Very Cool Game</span></h1>
            <h1 style="text-align: center; font-size: 67px; position: relative; top: 50px; left: 0; width: 100%; z-index: 1000; margin: 0px;"><span style="color: black">WASD to move</span></h1>
            <h1 style="text-align: center; font-size: 67px; position: relative; top: 50px; left: 0; width: 100%; z-index: 1000; margin: 0px;"><span style="color: black">Player automatically shoots bullets. Shoot enemies to gain XP!</span></h1>
            <h1 style="text-align: center; font-size: 67px; position: relative; top: 50px; left: 0; width: 100%; z-index: 1000; margin: 0px;"><span style="color: black">Fullscreen recommended and keyboard required</span></h1>

            <button onclick="ChangePage('IntroPage', false)" style="text-align: center; font-size: 67px; position: relative; top: 50px; left: 0; width: 100%; z-index: 1000; margin: 0;">Back</button>

        </div>
        <div id="newEnemyPage" style="display:none">
            <h1 style="text-align: center; font-size: 67px; position: absolute; top: 0; left: 0; width: 100%; z-index: 1000; margin: 0px;"><span style="background-color: black; color: white">New Enemy Discovered!</span></h1>
        </div>
    </head>
</html>
